name: Actualizar Experiencia SEIA

on:
  schedule:
    - cron: '0 12 * * 1'  # Lunes ~8am hora Chile (UTC-4)
  workflow_dispatch:       # Permite correr manualmente desde GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr scraper
        run: python actualizar_experiencia.py

      - name: Commitear Excel actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Experiencia SGA-GEOBIOTA.xlsx"
          git diff --staged --quiet || git commit -m "Actualización semanal $(date +'%Y-%m-%d')"
          git push
